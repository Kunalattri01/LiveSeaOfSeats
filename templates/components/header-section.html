{% load static %}
<header class="header-section">

    <!-- TOP ROW -->
    <div class="container">
        <div class="header-wrapper">

            <!-- LOGO -->
            <div class="logo">
                <!-- <a href="{% url 'HomePage' %}"> -->
                <a href="{% url 'TicketMasterEventsPage' %}">
                    <img src="{% static 'assets/images/logo/logo.png' %}" alt="logo">
                </a>
            </div>

            {% include 'components/search_bar.html' %}

            <!-- RIGHT SIDE -->
            <div class="header-tools">

                <!-- LOCATION -->
                <select class="header-location" onchange="setCity(this.value)">
                    <option value="">All Cities</option>

                    {% for row in all_cities %}
                        <option value="{{ row.name }},{{ row.country_code }}"
                            {% if request.session.city == row.name %}selected{% endif %}>
                            {{ row.name }}, {{ row.country_code }}
                        </option>
                    {% endfor %}
                </select>

                <!-- <ul class="menu">
                    <li>
                        <a href="{% url 'SignUpPage' %}" class="header-button{% if request.resolver_match.url_name == 'SignUpPage' %} active{% endif %}">
                            Join Us
                        </a>
                    </li>
                </ul> -->

            </div>

        </div>
    </div>

    <!-- MENU ROW (UNCHANGED) -->
    <div class="container">
        <div class="header-wrapper">
            <ul class="menu">
                <li>
                    <!-- <a href="{% url 'TicketMasterEventsPage' %}" class="{% if '/ticketmaster/' in request.path %}active{% endif %}"> TICKET MASTER </a> -->
                    <a href="{% url 'TicketMasterEventsPage' %}" class="{% if '/event_details/' in request.path %}active{% elif request.path == '/' %}active{% endif %}"> events </a>
                </li>
                <li>
                    <a href="{% url 'MovieGridPage' %}" class="{% if request.resolver_match.url_name == 'MovieGridPage' %}active{% endif %}">Movies</a>
                </li>
                <!-- <li>   ( future Aspect )
                    <a href="{% url 'EventPage' %}" class="{% if '/events/' in request.path %}active{% endif %}"> Events </a>
                </li> -->
                <li>
                    <a href="{% url 'SportsPage' %}" class="{% if request.resolver_match.url_name == 'SportsPage' %}active{% endif %}"> IPL </a>
                </li>
                <li>
                    <a href="{% url 'SportsPage' %}" class="{% if request.resolver_match.url_name == 'SportsPage' %}active{% endif %}"> Sports </a>
                </li>
                <li>
                    <a href="{% url 'HomePage' %}" class="{% if request.resolver_match.url_name == 'HomePage' %}active{% endif %}">ACTIVITIES</a>
                </li>
                <li>
                    <a href="{% url 'BlogPage' %}" class="{% if request.resolver_match.url_name == 'BlogPage' %}active{% endif %}"> AVIATION </a>
                </li>
                <li>
                    <a href="{% url 'HomePage' %}" class="{% if request.resolver_match.url_name == 'HomePage' %}active{% endif %}"> DINING </a>
                </li>
                <li>
                    <a href="{% url 'BlogPage' %}" class="{% if request.resolver_match.url_name == 'BlogPage' %}active{% endif %}"> Blog </a>
                </li>
                <li>
                    <a href="{% url 'ContactPage' %}" class="{% if request.resolver_match.url_name == 'ContactPage' %}active{% endif %}"> Contact </a>
                </li>
            </ul>
        </div>
    </div>
</header>

<script>
    function setCity(value) {
        const [city, country] = value.split(",");

        fetch("{% url 'SetCity' %}", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": "{{ csrf_token }}"
            },
            body: JSON.stringify({ city: city, country: country })
        }).then(() => location.reload());
    }
</script>
