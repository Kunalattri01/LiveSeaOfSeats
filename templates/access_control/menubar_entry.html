<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Menu Management</title>
</head>

<body class="bg-gray-100 p-10">

    <div class="max-w-6xl mx-auto bg-white p-8 rounded-lg shadow">

        <h2 class="text-xl font-semibold mb-6">Menu Form</h2>

        <form method="POST">
            {% csrf_token %}

            <!-- Row 1 -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

                <div>
                    <label class="block text-sm font-medium text-gray-600">Menu Name</label>
                    <input type="text" name="menu_name" class="w-full mt-1 border rounded-md px-3 py-2 focus:ring-2 focus:ring-blue-400" value="{{ menu.menu_name|default:'' }}">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-600">Position</label>
                    <input type="number" name="position" class="w-full mt-1 border rounded-md px-3 py-2 focus:ring-2 focus:ring-blue-400" value="{{ menu.position|default:'' }}">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-600">URL</label>
                    <input type="text" name="url" class="w-full mt-1 border rounded-md px-3 py-2 focus:ring-2 focus:ring-blue-400" value="{{ menu.url|default:'' }}">
                </div>

            </div>

            <!-- Row 2 -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-6">

                <div>
                    <label class="block text-sm font-medium text-gray-600">Icon</label>
                    <input type="text" name="icon" placeholder="fa fa-home" class="w-full mt-1 border rounded-md px-3 py-2 focus:ring-2 focus:ring-blue-400" value="{{ menu.icon|default:'' }}">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-600">Parent Menu</label>

                    <select name="parent" class="w-full mt-1 border rounded-md px-3 py-2">
                        <option value="">Select an option</option>
                        {% for row in dropdown_parent %}
                            <option value="{{ row.menu_code }}" {% if menu.parent.id == row.menu_code %} selected {% endif %}> {{ row.menu_name }} </option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-600">Status</label>
                    <select name="is_active" class="w-full mt-1 border rounded-md px-3 py-2">
                        <option value="1" {% if menu.is_active %} selected {% endif %}> Active </option>
                        <option value="0" {% if menu.is_active == False %} selected {% endif %}> Inactive </option>
                    </select>
                </div>

            </div>

            <!-- Buttons -->
            <div class="mt-6 flex gap-4">
                <button type="submit" class="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700"> Save Menu </button>
                <a href="" class="bg-gray-500 text-white px-6 py-2 rounded hover:bg-gray-600"> Cancel </a>
            </div>
        </form>

    </div>

    <!-- Table Section -->

    <div class="max-w-6xl mx-auto mt-10 bg-white p-8 rounded-lg shadow">

    <h2 class="text-xl font-semibold mb-4">Menu List</h2>

    <div class="overflow-x-auto">

    <table class="min-w-full border border-gray-200">

    <thead class="bg-gray-100">

    <tr>

    <th class="px-4 py-2 border">Menu Name</th>
    <th class="px-4 py-2 border">Position</th>
    <th class="px-4 py-2 border">URL</th>
    <th class="px-4 py-2 border">Icon</th>
    <th class="px-4 py-2 border">Parent</th>
    <th class="px-4 py-2 border">Status</th>

    </tr>

    </thead>

    <tbody>

    {% for row in menu_list %}

    <tr class="hover:bg-gray-50">

    <td class="px-4 py-2 border">{{ row.menu_name }}</td>
    <td class="px-4 py-2 border">{{ row.position }}</td>
    <td class="px-4 py-2 border">{{ row.url }}</td>
    <td class="px-4 py-2 border">{{ row.icon }}</td>

    <td class="px-4 py-2 border">
    {{ row.parent.menu_name|default:"-" }}
    </td>

    <td class="px-4 py-2 border">

    {% if row.is_active %}
    <span class="text-green-600 font-semibold">Active</span>
    {% else %}
    <span class="text-red-600 font-semibold">Inactive</span>
    {% endif %}

    </td>

    </tr>

    {% endfor %}

    </tbody>

    </table>

    </div>

    </div>

</body>
</html>
